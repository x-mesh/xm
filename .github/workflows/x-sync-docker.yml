name: x-sync Docker

on:
  push:
    branches: [main]
    paths: ['x-sync/**']
  pull_request:
    paths: ['x-sync/**']

  # Publish to GHCR on version tags
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: x-sync
          push: false
          tags: ghcr.io/x-mesh/x-sync:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: x-sync
          push: true
          tags: |
            ghcr.io/x-mesh/x-sync:latest
            ghcr.io/x-mesh/x-sync:${{ inputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
