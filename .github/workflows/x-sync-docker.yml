name: x-sync Docker

on:
  push:
    branches: [main]
    paths: ['x-sync/**', 'x-dashboard/**']
  pull_request:
    paths: ['x-sync/**', 'x-dashboard/**']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 0.2.0). Leave empty for auto-bump.'
        required: false
      bump:
        description: 'Auto-bump type (ignored if version is set)'
        required: false
        default: 'patch'
        type: choice
        options: [patch, minor, major]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: x-sync/Dockerfile
          push: false
          tags: jinwoo/x-sync:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4

      - name: Determine version
        id: version
        run: |
          # If explicit version provided, use it
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch latest version from Docker Hub
          BUMP="${{ inputs.bump || 'patch' }}"
          LATEST=$(curl -s "https://hub.docker.com/v2/repositories/jinwoo/x-sync/tags/?page_size=100" \
            | jq -r '.results[].name' 2>/dev/null \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            echo "tag=0.1.0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "tag=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "Previous: $LATEST → New: ${MAJOR}.${MINOR}.${PATCH} ($BUMP)"

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: x-sync/Dockerfile
          push: true
          tags: |
            jinwoo/x-sync:latest
            jinwoo/x-sync:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: echo "Published jinwoo/x-sync:${{ steps.version.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
