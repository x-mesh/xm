name: Cost invariants

on:
  push:
    branches: [main, develop]
    paths:
      - 'x-build/lib/cost/**'
      - 'xm/lib/cost/**'
      - 'test/cost-*.test.mjs'
      - 'package.json'
      - 'bun.lock'
  pull_request:
    paths:
      - 'x-build/lib/cost/**'
      - 'xm/lib/cost/**'
      - 'test/cost-*.test.mjs'
      - 'package.json'
      - 'bun.lock'

jobs:
  property-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun test test/cost-pipeline.prop.test.mjs
      - run: bash scripts/sync-bundle.sh --check
