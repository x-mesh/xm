services:
  x-sync:
    build:
      context: ..
      dockerfile: x-sync/Dockerfile
    image: jinwoo/x-sync:latest
    ports:
      - "${XM_SYNC_PORT:-19842}:19842"
    environment:
      - XM_SYNC_API_KEY=${XM_SYNC_API_KEY:?Set XM_SYNC_API_KEY in .env or environment}
      - XM_SYNC_DATA_DIR=/data
      - XM_SYNC_VERSION=${XM_SYNC_VERSION:-latest}
    volumes:
      - x-sync-db:/root/.xm/sync
      - x-sync-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:19842/dashboard/health').then(r=>{if(!r.ok)process.exit(1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  x-sync-db:
  x-sync-data:
